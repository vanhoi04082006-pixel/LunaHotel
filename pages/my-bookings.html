<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Hotel - Đặt Phòng Của Tôi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            overflow-x: hidden;
            min-height: 100vh;
            color: #0f172a;
        }

        .font-playfair {
            font-family: 'Playfair Display', serif;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes popInItem {
            0% {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .animate-item {
            opacity: 0;
            animation: popInItem 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .loader {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        .page-banner {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            position: relative;
            overflow: hidden;
        }

        .page-banner::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            background: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=');
            opacity: 0.5;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            transition: all 0.3s ease;
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        .form-input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            background: #ffffff;
        }

        .modal-backdrop {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .slide-in-up {
            animation: slideInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideInUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div id="loading-screen"
        class="fixed inset-0 bg-white z-[9999] flex items-center justify-center flex-col transition-opacity duration-500">
        <div class="text-center">
            <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-list-check text-4xl text-blue-600"></i>
            </div>
            <h2 class="text-3xl font-playfair font-bold text-slate-900 mb-4">Luna Hotel</h2>
            <div class="loader mx-auto mb-4"></div>
            <p class="text-slate-500 font-medium">Đang tải lịch sử đặt phòng...</p>
        </div>
    </div>

    <div id="toast-container" class="fixed top-5 right-5 z-[9998] space-y-3"></div>

    <div id="main-content">
        <div id="app-header"></div>

        <main class="min-h-[calc(100vh-80px)] bg-[#f8fafc] pb-24">
            <div class="page-banner pt-16 pb-24 mb-10 text-center px-4">
                <div class="relative z-10">
                    <h2 class="text-4xl md:text-5xl font-playfair font-bold text-white mb-4">Danh sách Đặt phòng</h2>
                    <p class="text-blue-100 text-[15px] font-medium max-w-xl mx-auto">Quản lý lịch trình, kiểm tra trạng
                        thái và thanh toán các dịch vụ của bạn tại Luna Hotel một cách dễ dàng.</p>
                </div>
            </div>

            <div class="max-w-5xl mx-auto px-4 md:px-8 -mt-20 relative z-20">
                <div
                    class="flex flex-wrap items-center justify-between mb-8 gap-4 bg-white/60 backdrop-blur-md p-4 rounded-2xl border border-white/50 shadow-sm">
                    <div class="flex items-center space-x-2 text-slate-600">
                        <i class="fa-solid fa-clock-rotate-left text-blue-600"></i>
                        <span class="font-bold text-[15px]">Lịch sử gần đây</span>
                    </div>
                    <a href="rooms.html"
                        class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-[14px] shadow-lg shadow-blue-600/30 hover:bg-blue-700 hover:-translate-y-0.5 transition-all">
                        <i class="fa-solid fa-plus mr-2"></i>Đặt phòng mới
                    </a>
                </div>

                <div class="space-y-6" id="bookings-container">
                    <div class="text-center py-20 bg-white rounded-[2rem] shadow-sm border border-slate-100">
                        <div class="loader mx-auto mb-4"></div>
                        <p class="text-slate-500 font-medium">Đang tải dữ liệu của bạn...</p>
                    </div>
                </div>
            </div>
        </main>

        <div id="app-footer"></div>
    </div>

    <!-- Modal thanh toán trực tiếp -->
    <div id="paymentModal" class="fixed inset-0 modal-backdrop z-[100] hidden flex items-center justify-center p-4">
        <div
            class="bg-white rounded-[2rem] w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl border border-slate-100">
            <div class="p-6 md:p-8">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span
                            class="inline-block px-3 py-1 rounded-full bg-blue-100 text-blue-700 text-xs font-bold mb-2"><i
                                class="fa-solid fa-shield-halved mr-1"></i> Thanh toán an toàn</span>
                        <h3 class="text-3xl font-playfair font-bold text-slate-900">Chi tiết thanh toán</h3>
                        <p id="payment-booking-code" class="text-slate-500 font-medium mt-1">Mã: #BK-001</p>
                    </div>
                    <button onclick="closePaymentModal()"

                        <i class="fa-solid fa-xmark text-lg"></i>
                    </button>
                </div>

                <div id="payment-content" class="space-y-6">
                    <!-- Nội dung sẽ được load bằng JS -->

                <div class="flex flex-col sm:flex-row justify-end gap-3 pt-6 border-t border-slate-100 mt-6">
                    <button onclick="closePaymentModal()"
                        class="px-6 py-3 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-all">Đóng</button>
                    <button onclick="processDirectPayment()" id="btn-process-payment"
                        class="px-6 py-3 rounded-xl font-bold text-white bg-blue-600 shadow-lg shadow-blue-600/30 hover:bg-blue-700 hover:-translate-y-0.5 transition-all">
                        <i class="fa-regular fa-credit-card mr-2"></i>Xác nhận thanh toán
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { loadHeader, loadFooter } from "../components.js";

        loadHeader('my-bookings');
        loadFooter();

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, getDoc, updateDoc, doc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg9Ex89QaMSyRH-0O7pwvWBJDvyz_x3jw",
            authDomain: "hotel-manager-2442d.firebaseapp.com",
            projectId: "hotel-manager-2442d",
            storageBucket: "hotel-manager-2442d.firebasestorage.app",
            messagingSenderId: "379010173725",
            appId: "1:379010173725:web:20908f11fb0589ca432ff4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let currentBookingForPayment = null;
        let currentDiscount = 0;
        let currentDiscountCode = '';

        function formatCurrency(amount) { return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount); }
        function formatDate(dateString) { if (!dateString) return ''; const d = new Date(dateString); return d.toLocaleDateString('vi-VN'); }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const icons = { success: 'fa-check text-green-500', error: 'fa-xmark text-red-500', warning: 'fa-exclamation text-amber-500', info: 'fa-info text-blue-500' };
            const bgColors = { success: 'bg-white border-green-100', error: 'bg-white border-red-100', warning: 'bg-white border-amber-100', info: 'bg-white border-blue-100' };

            toast.className = `flex items-center p-4 shadow-xl border rounded-2xl ${bgColors[type]} animate-item max-w-md bg-white/90 backdrop-blur-md z-[10000]`;
            toast.innerHTML = `<div class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center mr-3"><i class="fa-solid ${icons[type]} text-sm"></i></div><span class="font-semibold text-slate-800 text-[15px]">${message}</span>`;

            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        window.toggleMobileMenu = function () {
            const mobileMenu = document.getElementById('mobile-menu');
            if (mobileMenu) mobileMenu.classList.toggle('hidden');
        }

        window.closePaymentModal = function () {
            document.getElementById('paymentModal').classList.add('hidden');
            currentBookingForPayment = null;
            currentDiscount = 0;
            currentDiscountCode = '';
        }

        function updateUserUI() {
            const nameSpan = document.getElementById('user-name-display');
            const avatar = document.getElementById('user-avatar');
            const loginBtn = document.getElementById('loginButton');
            const logoutBtn = document.getElementById('logoutButton');
            const mobileLogoutBtn = document.getElementById('mobileLogoutBtn');
            const navItems = ['my-bookings', 'profile', 'loyalty', 'offers'];

            if (currentUser) {
                const name = currentUser.name || currentUser.email?.split('@')[0] || 'Khách';
                if (nameSpan) nameSpan.textContent = name;
                if (avatar) avatar.textContent = name.charAt(0).toUpperCase();
                if (loginBtn) loginBtn.classList.add('hidden');
                if (logoutBtn) logoutBtn.classList.remove('hidden');
                if (mobileLogoutBtn) mobileLogoutBtn.classList.remove('hidden');
                navItems.forEach(item => {
                    const desktop = document.getElementById(`nav-${item}`);
                    const mobile = document.getElementById(`mobile-${item}`);
                    if (desktop) desktop.classList.remove('hidden');
                    if (mobile) mobile.classList.remove('hidden');
                });
            } else {
                if (nameSpan) nameSpan.textContent = 'Khách';
                if (avatar) avatar.textContent = 'K';
                if (loginBtn) loginBtn.classList.remove('hidden');
                if (logoutBtn) logoutBtn.classList.add('hidden');
                if (mobileLogoutBtn) mobileLogoutBtn.classList.add('hidden');
                navItems.forEach(item => {
                    const desktop = document.getElementById(`nav-${item}`);
                    const mobile = document.getElementById(`mobile-${item}`);
                    if (desktop) desktop.classList.add('hidden');
                    if (mobile) mobile.classList.add('hidden');
                });
            }
        }

        window.handleLogout = async function () {
            if (confirm('Bạn có chắc muốn đăng xuất?')) {
                try {
                    const loadingDiv = document.getElementById('loading-screen');
                    if (loadingDiv) {
                        loadingDiv.style.opacity = '1';
                        loadingDiv.style.display = 'flex';
                    }
                    await signOut(auth);
                    localStorage.removeItem('currentUser');
                    currentUser = null;
                    updateUserUI();
                    setTimeout(() => { window.location.href = '../index.html'; }, 500);
                } catch (error) {
                    console.error('Logout error:', error);
                    showToast('Lỗi đăng xuất: ' + error.message, 'error');
                    document.getElementById('loading-screen').style.display = 'none';
                }
            }
        };

        async function applyPromoCode(code, originalAmount) {
            if (!code) return { success: false, discount: 0, message: 'Vui lòng nhập mã giảm giá' };

            try {
                const promotionsSnap = await getDocs(collection(db, 'promotions'));
                const promotions = promotionsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                const promo = promotions.find(p => p.code === code.toUpperCase() && p.active === true);

                if (!promo) {
                    return { success: false, discount: 0, message: 'Mã giảm giá không hợp lệ hoặc đã hết hạn' };
                }

                const now = new Date();
                const endDate = new Date(promo.endDate);
                if (endDate < now) {
                    return { success: false, discount: 0, message: 'Mã giảm giá đã hết hạn' };
                }

                let discount = 0;
                if (promo.type === 'percent') {
                    discount = originalAmount * promo.value / 100;
                } else {
                    discount = promo.value;
                }

                discount = Math.min(discount, originalAmount);

                return {
                    success: true,
                    discount: discount,
                    message: `Áp dụng thành công! Giảm ${promo.type === 'percent' ? promo.value + '%' : formatCurrency(promo.value)}`,
                    promo: promo
                };
            } catch (error) {
                console.error('Error applying promo:', error);
                return { success: false, discount: 0, message: 'Có lỗi xảy ra khi áp dụng mã' };
            }
        }

        window.openDirectPayment = async function (bookingId, booking) {
            const modal = document.getElementById('paymentModal');
            const content = document.getElementById('payment-content');

            currentBookingForPayment = booking;
            currentDiscount = 0;
            currentDiscountCode = '';

            document.getElementById('payment-booking-code').textContent = `Mã: #${bookingId.slice(-8).toUpperCase()}`;

            content.innerHTML = `
                <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 md:p-8 rounded-2xl text-white shadow-lg relative overflow-hidden">
                    <i class="fa-solid fa-wallet absolute -bottom-4 -right-4 text-8xl opacity-10 transform -rotate-12"></i>
                    <div class="relative z-10">
                        <div class="flex justify-between items-end mb-2">
                            <span class="text-sm font-medium text-blue-100 tracking-wide uppercase">Tổng thanh toán</span>
                            <span class="text-right text-sm text-blue-100">Phòng ${booking.roomCode}<br>${booking.nights || 1} đêm</span>
                        </div>
                        <span class="text-4xl font-bold tracking-tight" id="modal-total-amount">${formatCurrency(booking.totalPrice)}</span>
                    </div>
                </div>

                <div class="mt-6">
                    <div class="bg-slate-50 rounded-2xl p-5 mb-6">
                        <div class="flex justify-between items-center mb-4">
                            <span class="font-bold text-slate-700">Tạm tính</span>
                            <span class="text-xl font-bold text-slate-800" id="subtotal-amount">${formatCurrency(booking.totalPrice)}</span>
                        </div>
                        
                        <div class="border-t border-slate-200 pt-4 mb-4">
                            <div class="flex gap-3">
                                <input type="text" id="promo-code-input" placeholder="Nhập mã giảm giá" class="form-input flex-1 text-sm">
                                <button onclick="applyPromoCodeToPayment()" class="px-5 py-2 bg-slate-800 text-white rounded-xl font-bold text-sm hover:bg-blue-600 transition-all whitespace-nowrap">
                                    Áp dụng
                                </button>
                            </div>
                            <div id="promo-message" class="text-xs mt-2 hidden"></div>
                        </div>
                        
                        <div id="discount-section" class="hidden border-t border-slate-200 pt-4 mb-4">
                            <div class="flex justify-between items-center text-green-600">
                                <span class="font-bold">Giảm giá</span>
                                <span class="text-xl font-bold" id="discount-amount">-0₫</span>
                            </div>
                        </div>
                        
                        <div class="border-t border-slate-200 pt-4">
                            <div class="flex justify-between items-center">
                                <span class="font-bold text-slate-800 text-lg">Tổng cộng</span>
                                <span class="text-2xl font-bold text-blue-600" id="final-total-amount">${formatCurrency(booking.totalPrice)}</span>
                            </div>
                        </div>
                    </div>

                    <h4 class="font-bold text-slate-900 mb-4 text-[15px]">Chọn phương thức thanh toán</h4>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <label class="flex flex-col items-center p-4 bg-white rounded-2xl border-2 border-slate-100 cursor-pointer hover:border-blue-400 hover:bg-blue-50/50 transition-all group">
                            <input type="radio" name="paymentMethod" value="cash" class="hidden peer" checked>
                            <div class="w-12 h-12 rounded-full bg-slate-50 flex items-center justify-center mb-3 group-hover:bg-white peer-checked:bg-blue-100 peer-checked:text-blue-600 transition-colors">
                                <i class="fa-solid fa-money-bill-wave text-xl text-slate-600 peer-checked:text-blue-600"></i>
                            </div>
                            <span class="text-sm font-bold text-slate-700">Tiền mặt</span>
                        </label>
                        <label class="flex flex-col items-center p-4 bg-white rounded-2xl border-2 border-slate-100 cursor-pointer hover:border-blue-400 hover:bg-blue-50/50 transition-all group">
                            <input type="radio" name="paymentMethod" value="bank" class="hidden peer">
                            <div class="w-12 h-12 rounded-full bg-slate-50 flex items-center justify-center mb-3 group-hover:bg-white peer-checked:bg-blue-100 peer-checked:text-blue-600 transition-colors">
                                <i class="fa-solid fa-building-columns text-xl text-slate-600 peer-checked:text-blue-600"></i>
                            </div>
                            <span class="text-sm font-bold text-slate-700">Chuyển khoản</span>
                        </label>
                        <label class="flex flex-col items-center p-4 bg-white rounded-2xl border-2 border-slate-100 cursor-pointer hover:border-blue-400 hover:bg-blue-50/50 transition-all group">
                            <input type="radio" name="paymentMethod" value="credit" class="hidden peer">
                            <div class="w-12 h-12 rounded-full bg-slate-50 flex items-center justify-center mb-3 group-hover:bg-white peer-checked:bg-blue-100 peer-checked:text-blue-600 transition-colors">
                                <i class="fa-regular fa-credit-card text-xl text-slate-600 peer-checked:text-blue-600"></i>
                            </div>
                            <span class="text-sm font-bold text-slate-700">Thẻ Visa/Master</span>
                        </label>
                        <label class="flex flex-col items-center p-4 bg-white rounded-2xl border-2 border-slate-100 cursor-pointer hover:border-blue-400 hover:bg-blue-50/50 transition-all group">
                            <input type="radio" name="paymentMethod" value="wallet" class="hidden peer">
                            <div class="w-12 h-12 rounded-full bg-slate-50 flex items-center justify-center mb-3 group-hover:bg-white peer-checked:bg-blue-100 peer-checked:text-blue-600 transition-colors">
                                <i class="fa-solid fa-qrcode text-xl text-slate-600 peer-checked:text-blue-600"></i>
                            </div>
                            <span class="text-sm font-bold text-slate-700">Ví điện tử</span>
                        </label>
                    </div>

                    <!-- Bank Details Section -->
                    <div id="payment-bank-details" class="mt-5 p-5 bg-blue-50/80 rounded-2xl border border-blue-100 hidden slide-in-up">
                        <div class="flex items-center mb-4 text-blue-800"><i class="fa-solid fa-circle-info mr-2"></i><h4 class="font-bold">Thông tin chuyển khoản</h4></div>
                        <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-100 space-y-3 text-[15px] text-slate-700">
                            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center border-b border-slate-50 pb-2"><span class="text-slate-500 text-sm mb-1 sm:mb-0">Ngân hàng</span><span class="font-bold text-slate-900">Vietcombank</span></div>
                            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center border-b border-slate-50 pb-2"><span class="text-slate-500 text-sm mb-1 sm:mb-0">Số tài khoản</span><span class="font-mono font-bold text-blue-600 text-lg">1234 5678 9012 3456</span></div>
                            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center border-b border-slate-50 pb-2"><span class="text-slate-500 text-sm mb-1 sm:mb-0">Chủ tài khoản</span><span class="font-bold text-slate-900">LUNA HOTEL & RESORT</span></div>
                            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center"><span class="text-slate-500 text-sm mb-1 sm:mb-0">Nội dung</span><span class="font-mono font-bold bg-slate-100 px-3 py-1 rounded" id="payment-bank-content">PAY ${bookingId.slice(-8).toUpperCase()}</span></div>
                        </div>
                        <button onclick="copyBankInfo()" class="mt-4 w-full bg-white border border-blue-200 text-blue-700 py-3 rounded-xl font-bold hover:bg-blue-600 hover:text-white transition-all shadow-sm">
                            <i class="fa-regular fa-copy mr-2"></i>Sao chép thông tin
                        </button>
                    </div>

                    <!-- Credit Card Form -->
                    <div id="payment-credit-form" class="mt-5 space-y-4 hidden slide-in-up">
                        <div class="bg-slate-900 p-6 rounded-2xl text-white shadow-lg relative overflow-hidden h-48 flex flex-col justify-between">
                            <div class="absolute inset-0 opacity-20 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-blue-400 via-transparent to-transparent"></div>
                            <div class="flex justify-between items-center relative z-10">
                                <i class="fa-solid fa-microchip text-4xl text-yellow-400 opacity-80"></i>
                                <div class="space-x-2 text-2xl">
                                    <i class="fa-brands fa-cc-visa"></i>
                                    <i class="fa-brands fa-cc-mastercard"></i>
                                </div>
                            </div>
                            <div class="relative z-10 text-center">
                                <p class="text-2xl font-mono tracking-[0.2em] shadow-sm" id="payment-card-number">**** **** **** ****</p>
                            </div>
                            <div class="flex justify-between relative z-10">
                                <div><p class="text-[10px] opacity-70 uppercase tracking-widest mb-0.5">Hạn thẻ</p><p class="font-mono text-sm" id="payment-card-expiry">**/**</p></div>
                                <div class="text-right"><p class="text-[10px] opacity-70 uppercase tracking-widest mb-0.5">CVC/CVV</p><p class="font-mono text-sm" id="payment-card-cvv">***</p></div>
                            </div>
                        </div>
                        
                        <div class="pt-2">
                            <label class="form-label">Số thẻ</label>
                            <input type="text" id="payment-card-number-input" maxlength="19" placeholder="0000 0000 0000 0000" class="form-input text-lg font-mono">
                        </div>
                        <div class="grid grid-cols-2 gap-5">
                            <div><label class="form-label">Hạn thẻ (MM/YY)</label><input type="text" id="payment-card-expiry-input" maxlength="5" placeholder="MM/YY" class="form-input text-center"></div>
                            <div><label class="form-label">CVV</label><input type="password" id="payment-card-cvv-input" maxlength="3" placeholder="***" class="form-input text-center"></div>
                        </div>
                        <div><label class="form-label">Tên chủ thẻ (Không dấu)</label><input type="text" id="payment-card-name" placeholder="NGUYEN VAN A" class="form-input uppercase"></div>
                    </div>

                    <!-- Wallet QR Code -->
                    <div id="payment-wallet-details" class="mt-5 p-6 bg-slate-50 rounded-2xl border border-slate-100 hidden slide-in-up text-center">
                        <h4 class="font-bold text-slate-800 mb-2">Quét mã QR để thanh toán</h4>
                        <p class="text-sm text-slate-500 mb-6">Mở ứng dụng ngân hàng hoặc Momo, ZaloPay để quét mã</p>
                        <div class="inline-block p-4 bg-white rounded-2xl shadow-lg border border-slate-100">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=LUNA%20HOTEL%20${bookingId}" alt="QR Code" class="w-48 h-48">
                        </div>
                        <div class="flex justify-center gap-4 mt-6">
                            <img src="https://upload.wikimedia.org/wikipedia/vi/f/fe/MoMo_Logo.png" class="h-8 opacity-70 grayscale hover:grayscale-0 hover:opacity-100 transition-all cursor-pointer">
                            <img src="https://seeklogo.com/images/Z/zalopay-logo-6EA3E8E20B-seeklogo.com.png" class="h-8 opacity-70 grayscale hover:grayscale-0 hover:opacity-100 transition-all cursor-pointer">
                        </div>
                    </div>
                </div>
            `;

            // Gán sự kiện cho radio buttons
            document.querySelectorAll('input[name="paymentMethod"]').forEach(radio => {
                radio.addEventListener('change', function (e) {
                    // Cập nhật style cho các button
                    document.querySelectorAll('input[name="paymentMethod"]').forEach(r => {
                        r.parentElement.classList.remove('border-blue-500', 'ring-2', 'ring-blue-100');
                        r.parentElement.classList.add('border-slate-100');
                    });
                    e.target.parentElement.classList.remove('border-slate-100');
                    e.target.parentElement.classList.add('border-blue-500', 'ring-2', 'ring-blue-100');

                    // Hiển thị section tương ứng
                    document.getElementById('payment-bank-details').classList.add('hidden');
                    document.getElementById('payment-credit-form').classList.add('hidden');
                    document.getElementById('payment-wallet-details').classList.add('hidden');

                    if (e.target.value === 'bank') {
                        document.getElementById('payment-bank-details').classList.remove('hidden');
                    } else if (e.target.value === 'credit') {
                        document.getElementById('payment-credit-form').classList.remove('hidden');
                    } else if (e.target.value === 'wallet') {
                        document.getElementById('payment-wallet-details').classList.remove('hidden');
                    }
                });
            });

            // Gán sự kiện cho card input
            setTimeout(() => {
                const cardNumberInput = document.getElementById('payment-card-number-input');
                const cardExpiryInput = document.getElementById('payment-card-expiry-input');
                const cardCvvInput = document.getElementById('payment-card-cvv-input');

                if (cardNumberInput) {
                    cardNumberInput.addEventListener('input', function (e) {
                        let value = e.target.value.replace(/\D/g, '');
                        let formatted = '';
                        for (let i = 0; i < value.length; i++) {
                            if (i > 0 && i % 4 === 0) formatted += ' ';
                            formatted += value[i];
                        }
                        e.target.value = formatted;
                        document.getElementById('payment-card-number').textContent = formatted || '**** **** **** ****';
                    });
                }

                if (cardExpiryInput) {
                    cardExpiryInput.addEventListener('input', function (e) {
                        let value = e.target.value.replace(/\D/g, '');
                        e.target.value = value.length >= 2 ? value.slice(0, 2) + '/' + value.slice(2, 4) : value;
                        document.getElementById('payment-card-expiry').textContent = e.target.value || '**/**';
                    });
                }

                if (cardCvvInput) {
                    cardCvvInput.addEventListener('input', function (e) {
                        document.getElementById('payment-card-cvv').textContent = e.target.value.padEnd(3, '*');
                    });
                }
            }, 100);

            modal.classList.remove('hidden');
        };

        window.applyPromoCodeToPayment = async function () {
            const promoInput = document.getElementById('promo-code-input');
            const promoMessage = document.getElementById('promo-message');
            const discountSection = document.getElementById('discount-section');
            const discountAmountSpan = document.getElementById('discount-amount');
            const finalTotalSpan = document.getElementById('final-total-amount');
            const modalTotalSpan = document.getElementById('modal-total-amount');
            const subtotalSpan = document.getElementById('subtotal-amount');

            const code = promoInput.value.trim();
            const originalAmount = currentBookingForPayment.totalPrice;

            if (!code) {
                promoMessage.textContent = 'Vui lòng nhập mã giảm giá';
                promoMessage.className = 'text-xs mt-2 text-red-500';
                promoMessage.classList.remove('hidden');
                return;
            }

            const result = await applyPromoCode(code, originalAmount);

            if (result.success) {
                currentDiscount = result.discount;
                currentDiscountCode = code;

                const finalAmount = originalAmount - currentDiscount;

                // Cập nhật giao diện: Hiển thị tiền giảm và tiền tổng
                discountSection.classList.remove('hidden');
                discountAmountSpan.textContent = `-${formatCurrency(currentDiscount)}`;

                // CẬP NHẬT QUAN TRỌNG: Cập nhật lại tất cả các số tổng tiền trên Modal
                finalTotalSpan.textContent = formatCurrency(finalAmount);

                if (modalTotalSpan) {
                    modalTotalSpan.textContent = formatCurrency(finalAmount);
                }

                promoMessage.textContent = result.message;
                promoMessage.className = 'text-xs mt-2 text-green-600';
                promoMessage.classList.remove('hidden');
            } else {
                currentDiscount = 0;
                currentDiscountCode = '';

                discountSection.classList.add('hidden');
                finalTotalSpan.textContent = formatCurrency(originalAmount);

                // Cũng nên thêm check an toàn ở đây khi reset lại giá trị cũ
                if (modalTotalSpan) {
                    modalTotalSpan.textContent = formatCurrency(originalAmount);
                }

                promoMessage.textContent = result.message;
                promoMessage.className = 'text-xs mt-2 text-red-500';
                promoMessage.classList.remove('hidden');
            }
        };
        window.copyBankInfo = function () {
            const content = document.getElementById('payment-bank-content')?.textContent || '';
            navigator.clipboard.writeText(`Ngân hàng: Vietcombank\nSố TK: 1234 5678 9012 3456\nChủ TK: LUNA HOTEL & RESORT\nNội dung: ${content}`);
            showToast('Đã sao chép thông tin chuyển khoản', 'success');
        };

        window.processDirectPayment = async function () {
            if (!currentBookingForPayment) {
                showToast('Không tìm thấy thông tin đặt phòng', 'error');
                return;
            }

            const method = document.querySelector('input[name="paymentMethod"]:checked')?.value;
            if (!method) {
                showToast('Vui lòng chọn phương thức thanh toán', 'warning');
                return;
            }

            const btn = document.getElementById('btn-process-payment');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Đang xử lý...';
            btn.disabled = true;

            try {
                // Tính toán số tiền cuối cùng sau khi trừ mã giảm giá
                const finalAmount = currentBookingForPayment.totalPrice - currentDiscount;
                const bookingRef = doc(db, 'bookings', currentBookingForPayment.id);

                // Đảm bảo object paymentData lưu đúng số tiền thực tế khách phải trả
                const paymentData = {
                    bookingId: currentBookingForPayment.id,
                    amount: finalAmount, // Số tiền thực tế khách trả sau khi trừ mã
                    originalAmount: currentBookingForPayment.totalPrice, // Số tiền gốc ban đầu
                    discount: currentDiscount, // Số tiền được giảm
                    discountCode: currentDiscountCode || null, // Mã giảm giá (nếu có)
                    method: method,
                    status: 'completed',
                    transactionId: 'TXN' + Date.now() + Math.random().toString(36).substr(2, 9).toUpperCase(),
                    createdAt: new Date().toISOString(),
                    completedAt: new Date().toISOString(),
                    userEmail: currentBookingForPayment.userEmail,
                    roomCode: currentBookingForPayment.roomCode,
                    bookingDetails: {
                        checkIn: currentBookingForPayment.checkIn,
                        checkOut: currentBookingForPayment.checkOut,
                        nights: currentBookingForPayment.nights,
                        adultCount: currentBookingForPayment.adultCount,
                        childCount: currentBookingForPayment.childCount
                    }
                };

                if (currentUser) {
                    paymentData.userId = currentUser.uid;
                } else {
                    paymentData.isGuest = true;
                }

                // Lưu thông tin thanh toán vào collection 'payments'
                const paymentRef = await addDoc(collection(db, 'payments'), paymentData);

                // Cập nhật lại trạng thái booking bên collection 'bookings'
                await updateDoc(bookingRef, {
                    paymentStatus: 'paid',
                    paymentId: paymentRef.id,
                    discountApplied: currentDiscount,
                    discountCode: currentDiscountCode || null,
                    finalPaidAmount: finalAmount,
                    updatedAt: new Date().toISOString()
                });

                showToast('Thanh toán thành công!', 'success');
                closePaymentModal();

                // Load lại danh sách phòng (bạn cần đảm bảo hàm này đã được định nghĩa)
                if (typeof loadMyBookings === 'function') {
                    await loadMyBookings();
                }

            } catch (error) {
                console.error('Payment error:', error);
                showToast('Lỗi thanh toán: ' + error.message, 'error');
            } finally {
                // Trả lại trạng thái ban đầu cho nút bấm
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

        async function loadMyBookings() {
            const container = document.getElementById('bookings-container');

            if (!currentUser) {
                container.innerHTML = `
                    <div class="bg-white rounded-[2rem] p-10 text-center shadow-lg border border-slate-100 max-w-2xl mx-auto animate-item">
                        <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i class="fa-regular fa-user text-3xl text-blue-500"></i>
                        </div>
                        <h3 class="text-2xl font-playfair font-bold text-slate-800 mb-3">Vui lòng đăng nhập</h3>
                        <p class="text-slate-500 mb-8 text-[15px]">Đăng nhập để xem lịch sử và quản lý đặt phòng của bạn tại Luna Hotel.</p>
                        <a href="../login.html" class="inline-flex items-center px-8 py-3.5 bg-slate-900 text-white rounded-xl font-bold hover:bg-blue-600 shadow-lg transition-all">Đăng nhập ngay</a>
                    </div>`;
                return;
            }

            try {
                const q = query(collection(db, 'bookings'), where('userEmail', '==', currentUser.email));
                const querySnapshot = await getDocs(q);
                const bookings = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

                if (bookings.length === 0) {
                    container.innerHTML = `
                        <div class="bg-white rounded-[2rem] p-10 text-center shadow-lg border border-slate-100 max-w-2xl mx-auto animate-item">
                            <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i class="fa-regular fa-calendar-xmark text-3xl text-slate-400"></i>
                            </div>
                            <h3 class="text-2xl font-playfair font-bold text-slate-800 mb-3">Chưa có lịch trình</h3>
                            <p class="text-slate-500 mb-8 text-[15px]">Bạn chưa có phòng nào được đặt. Hãy bắt đầu lên kế hoạch cho kỳ nghỉ tuyệt vời của bạn!</p>
                            <a href="rooms.html" class="inline-flex items-center px-8 py-3.5 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-600/30 transition-all">Khám phá phòng ngay</a>
                        </div>`;
                    return;
                }

                const statusStyles = {
                    pending: { bg: 'bg-yellow-50', text: 'text-yellow-700', border: 'border-yellow-200', icon: 'fa-clock' },
                    confirmed: { bg: 'bg-blue-50', text: 'text-blue-700', border: 'border-blue-200', icon: 'fa-check' },
                    completed: { bg: 'bg-green-50', text: 'text-green-700', border: 'border-green-200', icon: 'fa-flag-checkered' },
                    cancelled: { bg: 'bg-red-50', text: 'text-red-700', border: 'border-red-200', icon: 'fa-xmark' }
                };
                const statusText = { pending: 'Chờ thanh toán', confirmed: 'Đã xác nhận', completed: 'Hoàn tất', cancelled: 'Đã hủy' };

                container.innerHTML = bookings.map((b, index) => {
                    const st = statusStyles[b.status];
                    const payBadge = b.paymentStatus === 'paid'
                        ? `<span class="px-3 py-1 rounded-full text-[11px] font-bold uppercase tracking-wider bg-green-50 text-green-600 border border-green-200"><i class="fa-solid fa-check mr-1"></i>Đã thanh toán</span>`
                        : `<span class="px-3 py-1 rounded-full text-[11px] font-bold uppercase tracking-wider bg-slate-50 text-slate-500 border border-slate-200">Chưa thanh toán</span>`;

                    return `
                    <div class="animate-item bg-white rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100/50 hover:shadow-[0_8px_30px_rgb(37,99,235,0.08)] transition-all duration-300" style="animation-delay: ${index * 0.1}s">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between p-5 md:p-6 border-b border-slate-50 gap-4">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 bg-slate-900 rounded-xl flex items-center justify-center text-white font-bold font-playfair shadow-md">
                                    ${b.roomCode}
                                </div>
                                <div>
                                    <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">Mã đặt phòng</p>
                                    <p class="font-mono font-bold text-slate-800">#${b.id.slice(-8).toUpperCase()}</p>
                                </div>
                            </div>
                            <div class="flex flex-wrap items-center gap-2">
                                <span class="px-3 py-1 rounded-full text-[11px] font-bold uppercase tracking-wider ${st.bg} ${st.text} ${st.border} border"><i class="fa-solid ${st.icon} mr-1"></i>${statusText[b.status]}</span>
                                ${payBadge}
                            </div>
                        </div>

                        <div class="p-5 md:p-6 bg-slate-50/30">
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                                <div>
                                    <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">Nhận phòng</p>
                                    <p class="font-bold text-slate-800 text-[15px]">${formatDate(b.checkIn)}</p>
                                </div>
                                <div>
                                    <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">Trả phòng</p>
                                    <p class="font-bold text-slate-800 text-[15px]">${formatDate(b.checkOut)}</p>
                                </div>
                                <div>
                                    <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">Thời gian</p>
                                    <p class="font-bold text-slate-800 text-[15px]">${b.nights} đêm</p>
                                </div>
                                <div>
                                    <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">Khách</p>
                                    <p class="font-bold text-slate-800 text-[15px]">${b.adultCount} <i class="fa-solid fa-user text-slate-300 mx-1"></i> ${b.childCount ? `, ${b.childCount} <i class="fa-solid fa-child text-slate-300 ml-1"></i>` : ''}</p>
                                </div>
                            </div>

                            ${b.services?.length ? `
                            <div class="mt-5 pt-5 border-t border-slate-100">
                                <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-2">Dịch vụ đi kèm</p>
                                <div class="flex flex-wrap gap-2">
                                    ${b.services.map(s => `<span class="bg-white border border-slate-200 text-slate-600 text-xs px-3 py-1 rounded-full font-medium shadow-sm">${s.name} (+${formatCurrency(s.price)})</span>`).join('')}
                                </div>
                            </div>` : ''}
                            
                            ${b.specialRequests ? `
                            <div class="mt-4 p-3 bg-blue-50/50 border border-blue-100 rounded-xl">
                                <p class="text-[13px] text-blue-800"><span class="font-bold mr-1">Yêu cầu đặc biệt:</span> ${b.specialRequests}</p>
                            </div>` : ''}
                        </div>

                        <div class="p-5 md:p-6 border-t border-slate-50 flex flex-col sm:flex-row items-center justify-between gap-4">
                            <div>
    <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">Tổng chi phí</p>
    <p class="text-2xl font-bold text-blue-600 font-mono">
        ${b.finalPaidAmount ? formatCurrency(b.finalPaidAmount) : formatCurrency(b.totalPrice)}
    </p>
    ${b.discountApplied ? `
        <p class="text-[11px] text-slate-400 mt-1">Giá gốc: <del>${formatCurrency(b.totalPrice)}</del></p>
        <p class="text-xs text-green-600 font-medium">Đã áp mã: -${formatCurrency(b.discountApplied)}</p>
    ` : ''}
</div>
                            <div class="flex gap-3 w-full sm:w-auto">
                                ${b.status === 'pending' || (b.status === 'confirmed' && b.paymentStatus !== 'paid') ?
                            `<button onclick="cancelBooking('${b.id}')" class="flex-1 sm:flex-none px-5 py-2.5 rounded-xl font-bold text-red-600 bg-red-50 hover:bg-red-100 transition-all text-sm">Hủy lịch</button>` : ''}
                                
                                ${b.status !== 'cancelled' && b.paymentStatus !== 'paid' ?
                            `<button onclick="openDirectPayment('${b.id}', ${JSON.stringify(b).replace(/"/g, '&quot;')})" class="flex-1 sm:flex-none px-5 py-2.5 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-600/30 transition-all text-sm text-center">Thanh toán ngay</button>` : ''}
                            </div>
                        </div>
                    </div>
                `}).join('');
            } catch (error) {
                console.error(error);
                container.innerHTML = `
                    <div class="bg-white rounded-[2rem] p-10 text-center shadow-lg border border-red-100 max-w-2xl mx-auto">
                        <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-triangle-exclamation text-3xl text-red-400"></i></div>
                        <h3 class="text-xl font-bold text-slate-800 mb-2">Lỗi tải dữ liệu</h3>
                        <p class="text-slate-500 text-[15px] mb-6">Hệ thống đang gặp sự cố khi tải dữ liệu của bạn.</p>
                        <button onclick="window.location.reload()" class="inline-flex items-center px-6 py-2.5 bg-slate-900 text-white rounded-xl font-bold hover:bg-blue-600 transition-all">Thử lại</button>
                    </div>`;
            }
        }

        window.cancelBooking = async function (bookingId) {
            if (confirm('Bạn có chắc chắn muốn hủy đặt phòng này? Hành động này không thể hoàn tác.')) {
                try {
                    await updateDoc(doc(db, 'bookings', bookingId), { status: 'cancelled', updatedAt: new Date().toISOString() });
                    showToast('Đã hủy lịch đặt phòng', 'success');
                    await loadMyBookings();
                } catch (error) {
                    showToast('Có lỗi xảy ra: ' + error.message, 'error');
                }
            }
        }

        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            updateUserUI();
        }

        onAuthStateChanged(auth, async (user) => {
            setTimeout(() => {
                const loadingScreen = document.getElementById('loading-screen');
                if (loadingScreen) {
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => { loadingScreen.style.display = 'none'; }, 500);
                }
            }, 800);

            if (user) {
                try {
                    const userDoc = await getDoc(doc(db, 'users', user.uid));
                    currentUser = {
                        uid: user.uid,
                        email: user.email,
                        name: userDoc.data()?.name || user.displayName || user.email.split('@')[0],
                        phone: userDoc.data()?.phone || ''
                    };
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                } catch (error) {
                    console.error('Error fetching user data:', error);
                    currentUser = { uid: user.uid, email: user.email, name: user.email.split('@')[0] };
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                }
            } else {
                currentUser = null;
                localStorage.removeItem('currentUser');
            }
            updateUserUI();
            await loadMyBookings();
        });
    </script>
</body>

</html>
