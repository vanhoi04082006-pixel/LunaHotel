<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Hotel - Tra Cứu Đặt Phòng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            color: #0f172a;
        }

        .font-playfair {
            font-family: 'Playfair Display', serif;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes slideInUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .slide-in-up {
            animation: slideInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .loader {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            transition: all 0.3s ease;
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        .form-input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            background: #ffffff;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
        }

        .badge {
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .badge-success {
            background: #dcfce7;
            color: #166534;
        }

        .badge-warning {
            background: #fef9c3;
            color: #854d0e;
        }

        .badge-info {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge-danger {
            background: #fee2e2;
            color: #991b1b;
        }

        .modal-backdrop {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
        }

        .lookup-hero {
            background-image: url('https://images.unsplash.com/photo-1574680096145-d05b474e2155?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60vh;
            z-index: 0;
        }

        .lookup-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.7), #f8fafc);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body>
    <div id="loading-screen"
        class="fixed inset-0 bg-white z-[9999] flex items-center justify-center flex-col transition-opacity duration-500">
        <div class="text-center">
            <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-magnifying-glass text-4xl text-blue-600"></i>
            </div>
            <h2 class="text-3xl font-playfair font-bold text-slate-900 mb-4">Luna Hotel</h2>
            <div class="loader mx-auto mb-4"></div>
            <p class="text-slate-500 font-medium">Đang tải hệ thống tra cứu...</p>
        </div>
    </div>

    <div id="toast-container" class="fixed top-5 right-5 z-[9998] space-y-3"></div>

    <div id="main-content">
        <div id="app-header"></div>

        <main class="relative min-h-[calc(100vh-80px)] pt-16 pb-24">
            <div class="lookup-hero"></div>
            <div class="lookup-overlay"></div>

            <div class="relative z-10 max-w-3xl mx-auto px-4">
                <div class="text-center mb-10 slide-in-up">
                    <span
                        class="inline-block py-1 px-3 rounded-full bg-white/20 backdrop-blur-md text-white border border-white/30 text-xs font-bold tracking-widest uppercase mb-4">Quản
                        lý hành trình</span>
                    <h2 class="text-4xl md:text-5xl font-playfair font-bold text-white mb-4 drop-shadow-md">Tra cứu mã
                        đặt phòng</h2>
                    <p class="text-slate-200 text-[15px] font-medium">Nhập thông tin bên dưới để kiểm tra trạng thái và
                        thanh toán</p>
                </div>

                <div class="bg-white/95 backdrop-blur-2xl rounded-[2rem] p-8 md:p-10 shadow-[0_20px_50px_rgb(0,0,0,0.1)] border border-white/50 slide-in-up"
                    style="animation-delay: 0.1s;">
                    <form onsubmit="lookupBooking(event)" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="form-label">Email đã dùng đặt phòng</label>
                                <div class="relative">
                                    <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                    <input type="email" id="lookupEmail" class="form-input pl-11"
                                        placeholder="email@example.com" required>
                                </div>
                            </div>
                            <div>
                                <label class="form-label">Mã đặt phòng (Booking ID)</label>
                                <div class="relative">
                                    <i class="fa-solid fa-hashtag absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                    <input type="text" id="lookupBookingId" class="form-input pl-11"
                                        placeholder="VD: 1A2B3C4D" required>
                                </div>
                            </div>
                        </div>

                        <button type="submit" id="btn-submit-lookup"
                            class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-[15px] shadow-lg shadow-blue-600/30 hover:bg-blue-700 hover:-translate-y-0.5 transition-all duration-300">
                            <i class="fa-solid fa-magnifying-glass mr-2"></i>Tìm kiếm thông tin
                        </button>
                    </form>
                </div>

                <div id="lookupResult" class="mt-8 hidden slide-in-up"></div>
            </div>
        </main>

        <div id="app-footer"></div>
    </div>

    <div id="paymentModal" class="fixed inset-0 modal-backdrop z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl border border-slate-100 slide-in-up">
            <div class="p-6 md:p-8">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span class="badge badge-info mb-2"><i class="fa-solid fa-shield-halved mr-1"></i> Thanh toán an toàn</span>
                        <h3 class="text-3xl font-playfair font-bold text-slate-900">Chi tiết thanh toán</h3>
                        <p id="payment-booking-code" class="text-slate-500 font-medium mt-1">Mã: #BK-001</p>
                    </div>
                    <button onclick="closeModal('paymentModal')"
                        class="text-slate-400 hover:text-slate-800 bg-slate-50 hover:bg-slate-100 rounded-full w-10 h-10 flex items-center justify-center transition-all">
                        <i class="fa-solid fa-xmark text-lg"></i>
                    </button>
                </div>

                <div id="payment-content" class="space-y-6"></div>

                <div class="flex flex-col sm:flex-row justify-end gap-3 pt-6 border-t border-slate-100 mt-6">
                    <button onclick="closeModal('paymentModal')"
                        class="px-6 py-3 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-all">Đóng</button>
                    <button onclick="processPayment()" id="btn-process-payment"
                        class="px-6 py-3 rounded-xl font-bold text-white bg-blue-600 shadow-lg shadow-blue-600/30 hover:bg-blue-700 hover:-translate-y-0.5 transition-all">
                        <i class="fa-regular fa-credit-card mr-2"></i>Xác nhận thanh toán
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { loadHeader, loadFooter } from "../components.js";
        loadHeader('lookup');
        loadFooter();

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, doc, updateDoc, addDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg9Ex89QaMSyRH-0O7pwvWBJDvyz_x3jw",
            authDomain: "hotel-manager-2442d.firebaseapp.com",
            projectId: "hotel-manager-2442d",
            storageBucket: "hotel-manager-2442d.firebasestorage.app",
            messagingSenderId: "379010173725",
            appId: "1:379010173725:web:20908f11fb0589ca432ff4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let currentBooking = null;
        let currentDiscount = 0;
        let currentDiscountCode = '';

        function formatCurrency(amount) { return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount); }
        function formatDate(dateString) { if (!dateString) return ''; const d = new Date(dateString); return d.toLocaleDateString('vi-VN'); }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const icons = { success: 'fa-check text-green-500', error: 'fa-xmark text-red-500', warning: 'fa-exclamation text-amber-500', info: 'fa-info text-blue-500' };
            const bgColors = { success: 'bg-white border-green-100', error: 'bg-white border-red-100', warning: 'bg-white border-amber-100', info: 'bg-white border-blue-100' };

            toast.className = `flex items-center p-4 shadow-xl border rounded-2xl ${bgColors[type]} slide-in-up max-w-md bg-white/90 backdrop-blur-md z-[10000]`;
            toast.innerHTML = `<div class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center mr-3"><i class="fa-solid ${icons[type]} text-sm"></i></div><span class="font-semibold text-slate-800 text-[15px]">${message}</span>`;

            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        window.toggleMobileMenu = function () {
            const mobileMenu = document.getElementById('mobile-menu');
            if (mobileMenu) mobileMenu.classList.toggle('hidden');
        };

        window.closeModal = function (id) {
            document.getElementById(id).classList.add('hidden');
            currentDiscount = 0;
            currentDiscountCode = '';
        };

        function updateUserUI() {
            const nameSpan = document.getElementById('user-name-display');
            const avatar = document.getElementById('user-avatar');
            const loginBtn = document.getElementById('loginButton');
            const logoutBtn = document.getElementById('logoutButton');
            const mobileLogout = document.getElementById('mobileLogoutBtn');
            const navItems = ['my-bookings', 'profile', 'loyalty', 'offers'];

            if (currentUser) {
                const name = currentUser.name || currentUser.email?.split('@')[0] || 'Khách';
                if (nameSpan) nameSpan.textContent = name;
                if (avatar) avatar.textContent = name.charAt(0).toUpperCase();
                if (loginBtn) loginBtn.classList.add('hidden');
                if (logoutBtn) logoutBtn.classList.remove('hidden');
                if (mobileLogout) mobileLogout.classList.remove('hidden');
                navItems.forEach(item => {
                    const desktop = document.getElementById(`nav-${item}`);
                    const mobile = document.getElementById(`mobile-${item}`);
                    if (desktop) desktop.classList.remove('hidden');
                    if (mobile) mobile.classList.remove('hidden');
                });
            } else {
                if (nameSpan) nameSpan.textContent = 'Khách';
                if (avatar) avatar.textContent = 'K';
                if (loginBtn) loginBtn.classList.remove('hidden');
                if (logoutBtn) logoutBtn.classList.add('hidden');
                if (mobileLogout) mobileLogout.classList.add('hidden');
                navItems.forEach(item => {
                    const desktop = document.getElementById(`nav-${item}`);
                    const mobile = document.getElementById(`mobile-${item}`);
                    if (desktop) desktop.classList.add('hidden');
                    if (mobile) mobile.classList.add('hidden');
                });
            }
        }

        window.handleLogout = async function () {
            if (confirm('Bạn có chắc muốn đăng xuất?')) {
                try {
                    document.getElementById('loading-screen').style.opacity = '1';
                    document.getElementById('loading-screen').style.display = 'flex';
                    await signOut(auth);
                    localStorage.removeItem('currentUser');
                    window.location.href = '../index.html';
                } catch (error) {
                    showToast('Lỗi: ' + error.message, 'error');
                    document.getElementById('loading-screen').style.display = 'none';
                }
            }
        };

        async function applyPromoCode(code, originalAmount) {
            if (!code) return { success: false, discount: 0, message: 'Vui lòng nhập mã giảm giá' };
            
            try {
                const promotionsSnap = await getDocs(collection(db, 'promotions'));
                const promotions = promotionsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                const promo = promotions.find(p => p.code === code.toUpperCase() && p.active === true);
                
                if (!promo) {
                    return { success: false, discount: 0, message: 'Mã giảm giá không hợp lệ hoặc đã hết hạn' };
                }
                
                const now = new Date();
                const endDate = new Date(promo.endDate);
                if (endDate < now) {
                    return { success: false, discount: 0, message: 'Mã giảm giá đã hết hạn' };
                }
                
                let discount = 0;
                if (promo.type === 'percent') {
                    discount = originalAmount * promo.value / 100;
                } else {
                    discount = promo.value;
                }
                
                discount = Math.min(discount, originalAmount);
                
                return { 
                    success: true, 
                    discount: discount, 
                    message: `Áp dụng thành công! Giảm ${promo.type === 'percent' ? promo.value + '%' : formatCurrency(promo.value)}`,
                    promo: promo
                };
            } catch (error) {
                console.error('Error applying promo:', error);
                return { success: false, discount: 0, message: 'Có lỗi xảy ra khi áp dụng mã' };
            }
        }

        window.applyPromoCodeToPayment = async function () {
            const promoInput = document.getElementById('promo-code-input');
            const promoMessage = document.getElementById('promo-message');
            const discountSection = document.getElementById('discount-section');
            const discountAmountSpan = document.getElementById('discount-amount');
            const finalTotalSpan = document.getElementById('final-total-amount');
            const modalTotalSpan = document.getElementById('modal-total-amount');
            const subtotalSpan = document.getElementById('subtotal-amount');
            
            const code = promoInput.value.trim();
            const originalAmount = currentBooking.totalPrice;
            
            if (!code) {
                promoMessage.textContent = 'Vui lòng nhập mã giảm giá';
                promoMessage.className = 'text-xs mt-2 text-red-500';
                promoMessage.classList.remove('hidden');
                return;
            }
            
            const result = await applyPromoCode(code, originalAmount);
            
            if (result.success) {
                currentDiscount = result.discount;
                currentDiscountCode = code;
                
                const finalAmount = originalAmount - currentDiscount;
                
                discountSection.classList.remove('hidden');
                discountAmountSpan.textContent = `-${formatCurrency(currentDiscount)}`;
                finalTotalSpan.textContent = formatCurrency(finalAmount);
                if (modalTotalSpan) modalTotalSpan.textContent = formatCurrency(finalAmount);
                promoMessage.textContent = result.message;
                promoMessage.className = 'text-xs mt-2 text-green-600';
                promoMessage.classList.remove('hidden');
            } else {
                currentDiscount = 0;
                currentDiscountCode = '';
                discountSection.classList.add('hidden');
                finalTotalSpan.textContent = formatCurrency(originalAmount);
                if (modalTotalSpan) modalTotalSpan.textContent = formatCurrency(originalAmount);
                promoMessage.textContent = result.message;
                promoMessage.className = 'text-xs mt-2 text-red-500';
                promoMessage.classList.remove('hidden');
            }
        };

        window.copyBankInfo = function () {
            const content = document.getElementById('payment-bank-content')?.textContent || '';
            navigator.clipboard.writeText(`Ngân hàng: Vietcombank\nSố TK: 1234 5678 9012 3456\nChủ TK: LUNA HOTEL & RESORT\nNội dung: ${content}`);
            showToast('Đã sao chép thông tin chuyển khoản', 'success');
        };

        window.lookupBooking = async function (e) {
            e.preventDefault();
            const email = document.getElementById('lookupEmail').value;
            const bookingId = document.getElementById('lookupBookingId').value.replace('#', '').trim();
            const resultDiv = document.getElementById('lookupResult');
            const btnSubmit = document.getElementById('btn-submit-lookup');

            const originalBtnHtml = btnSubmit.innerHTML;
            btnSubmit.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Đang tra cứu...';
            btnSubmit.disabled = true;

            try {
                const q = query(collection(db, 'bookings'), where('userEmail', '==', email));
                const querySnapshot = await getDocs(q);

                resultDiv.classList.remove('hidden');

                if (querySnapshot.empty) {
                    resultDiv.innerHTML = `
                        <div class="bg-white rounded-[2rem] p-8 text-center shadow-lg border border-red-100">
                            <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-file-circle-xmark text-3xl text-red-400"></i></div>
                            <h3 class="text-xl font-bold text-slate-800 mb-2">Không tìm thấy email này</h3>
                            <p class="text-slate-500 text-[15px]">Hệ thống không ghi nhận đặt phòng nào liên kết với email <strong>${email}</strong>.</p>
                        </div>`;
                    return;
                }

                let foundBooking = null;
                querySnapshot.forEach(doc => {
                    if (doc.id.includes(bookingId) || doc.id.slice(-8).toUpperCase() === bookingId.toUpperCase()) {
                        foundBooking = { id: doc.id, ...doc.data() };
                    }
                });

                if (!foundBooking) {
                    resultDiv.innerHTML = `
                        <div class="bg-white rounded-[2rem] p-8 text-center shadow-lg border border-red-100">
                            <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-barcode text-3xl text-red-400"></i></div>
                            <h3 class="text-xl font-bold text-slate-800 mb-2">Sai mã đặt phòng</h3>
                            <p class="text-slate-500 text-[15px]">Có tìm thấy email, nhưng mã <strong>#${bookingId}</strong> không chính xác. Vui lòng kiểm tra lại!</p>
                        </div>`;
                    return;
                }

                currentBooking = foundBooking;
                currentDiscount = 0;
                currentDiscountCode = '';
                
                const statusColors = { pending: 'badge-warning', confirmed: 'badge-info', completed: 'badge-success', cancelled: 'badge-danger' };
                const statusIcons = { pending: 'fa-clock', confirmed: 'fa-check', completed: 'fa-flag-checkered', cancelled: 'fa-xmark' };
                const statusText = { pending: 'Chờ thanh toán', confirmed: 'Đã xác nhận', completed: 'Hoàn tất', cancelled: 'Đã hủy' };

                resultDiv.innerHTML = `
                    <div class="bg-white rounded-[2rem] shadow-2xl border border-slate-100 overflow-hidden relative">
                        <div class="bg-slate-900 p-6 md:p-8 text-white relative">
                            <div class="absolute top-0 right-0 p-4 opacity-10"><i class="fa-solid fa-ticket text-8xl"></i></div>
                            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 relative z-10">
                                <div>
                                    <span class="text-slate-400 text-xs font-bold uppercase tracking-widest block mb-1">Mã xác nhận</span>
                                    <h3 class="text-3xl font-mono font-bold tracking-wider">#${foundBooking.id.slice(-8).toUpperCase()}</h3>
                                </div>
                                <span class="badge ${statusColors[foundBooking.status]} text-sm px-4 py-1.5"><i class="fa-solid ${statusIcons[foundBooking.status]} mr-2"></i>${statusText[foundBooking.status]}</span>
                            </div>
                        </div>

                        <div class="relative h-6 bg-white overflow-hidden flex items-center w-full">
                            <div class="absolute -left-3 w-6 h-6 bg-[#f8fafc] rounded-full shadow-[inset_-3px_0_5px_rgba(0,0,0,0.05)]"></div>
                            <div class="w-full border-t-2 border-dashed border-slate-200"></div>
                            <div class="absolute -right-3 w-6 h-6 bg-[#f8fafc] rounded-full shadow-[inset_3px_0_5px_rgba(0,0,0,0.05)]"></div>
                        </div>

                        <div class="p-6 md:p-8 pt-2">
                            <h4 class="font-bold text-slate-900 text-lg mb-6 border-b border-slate-100 pb-4">Phòng ${foundBooking.roomCode}</h4>
                            
                            <div class="grid grid-cols-2 gap-y-6 gap-x-4 mb-8">
                                <div>
                                    <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">Nhận phòng</p>
                                    <p class="font-bold text-slate-800">${formatDate(foundBooking.checkIn)}</p>
                                </div>
                                <div>
                                    <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">Trả phòng</p>
                                    <p class="font-bold text-slate-800">${formatDate(foundBooking.checkOut)}</p>
                                </div>
                                <div>
                                    <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">Thời gian</p>
                                    <p class="font-bold text-slate-800">${foundBooking.nights} đêm</p>
                                </div>
                                <div>
                                    <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">Số khách</p>
                                    <p class="font-bold text-slate-800">${foundBooking.adultCount} <i class="fa-solid fa-user text-slate-300 mx-1"></i> ${foundBooking.childCount ? `, ${foundBooking.childCount} <i class="fa-solid fa-child text-slate-300 ml-1"></i>` : ''}</p>
                                </div>
                            </div>

                            ${foundBooking.services?.length ? `
                            <div class="bg-slate-50 rounded-xl p-4 mb-8">
                                <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-2">Dịch vụ đi kèm</p>
                                <div class="flex flex-wrap gap-2">
                                    ${foundBooking.services.map(s => `<span class="bg-white border border-slate-200 text-slate-700 text-xs px-3 py-1 rounded-full font-medium shadow-sm">${s.name}</span>`).join('')}
                                </div>
                            </div>` : ''}

                            <div class="bg-blue-50/50 rounded-2xl p-5 border border-blue-100 flex items-center justify-between">
                                <div>
                                    <p class="text-xs text-blue-600 font-bold uppercase tracking-wider mb-1">Tổng chi phí</p>
                                    <p class="text-2xl font-bold text-blue-700">${formatCurrency(foundBooking.totalPrice)}</p>
                                    ${foundBooking.discountApplied ? `<p class="text-xs text-green-600">Đã giảm ${formatCurrency(foundBooking.discountApplied)}</p>` : ''}
                                </div>
                                ${foundBooking.paymentStatus === 'paid' ?
                        `<div class="bg-white px-4 py-2 rounded-xl text-green-600 font-bold shadow-sm border border-green-100 flex items-center"><i class="fa-solid fa-check-circle mr-2 text-lg"></i>Đã thanh toán</div>`
                        : foundBooking.status !== 'cancelled' ?
                            `<button onclick="openPaymentModal('${foundBooking.id}')" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-blue-600/30 hover:bg-blue-700 hover:-translate-y-0.5 transition-all">Thanh toán ngay</button>`
                            : ''}
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Lookup error:', error);
                resultDiv.innerHTML = `
                    <div class="bg-white rounded-[2rem] p-8 text-center shadow-lg border border-red-100">
                        <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-triangle-exclamation text-3xl text-red-400"></i></div>
                        <h3 class="text-xl font-bold text-slate-800 mb-2">Lỗi kết nối</h3>
                        <p class="text-slate-500 text-[15px]">${error.message}</p>
                    </div>`;
            } finally {
                btnSubmit.innerHTML = originalBtnHtml;
                btnSubmit.disabled = false;
            }
        };

        window.openPaymentModal = async function (bookingId) {
            const booking = currentBooking || await (async () => {
                const docSnap = await getDoc(doc(db, 'bookings', bookingId));
                return { id: docSnap.id, ...docSnap.data() };
            })();

            if (!booking) {
                showToast('Không tìm thấy thông tin đặt phòng', 'error');
                return;
            }

            currentBooking = booking;
            currentDiscount = 0;
            currentDiscountCode = '';

            const modal = document.getElementById('paymentModal');
            const content = document.getElementById('payment-content');

            let hiddenInput = document.getElementById('payment-booking-id');
            if (!hiddenInput) {
                hiddenInput = document.createElement('input');
                hiddenInput.type = 'hidden';
                hiddenInput.id = 'payment-booking-id';
                modal.querySelector('.p-6').appendChild(hiddenInput);
            }
            hiddenInput.value = bookingId;
            document.getElementById('payment-booking-code').textContent = `Mã: #${bookingId.slice(-8).toUpperCase()}`;

            content.innerHTML = `
                <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 md:p-8 rounded-2xl text-white shadow-lg relative overflow-hidden">
                    <i class="fa-solid fa-wallet absolute -bottom-4 -right-4 text-8xl opacity-10 transform -rotate-12"></i>
                    <div class="relative z-10">
                        <div class="flex justify-between items-end mb-2">
                            <span class="text-sm font-medium text-blue-100 tracking-wide uppercase">Tổng thanh toán</span>
                            <span class="text-right text-sm text-blue-100">Phòng ${booking.roomCode}<br>${booking.nights || 1} đêm</span>
                        </div>
                        <span class="text-4xl font-bold tracking-tight" id="modal-total-amount">${formatCurrency(booking.totalPrice)}</span>
                    </div>
                </div>

                <div class="mt-6">
                    <div class="bg-slate-50 rounded-2xl p-5 mb-6">
                        <div class="flex justify-between items-center mb-4">
                            <span class="font-bold text-slate-700">Tạm tính</span>
                            <span class="text-xl font-bold text-slate-800" id="subtotal-amount">${formatCurrency(booking.totalPrice)}</span>
                        </div>
                        
                        <div class="border-t border-slate-200 pt-4 mb-4">
                            <div class="flex gap-3">
                                <input type="text" id="promo-code-input" placeholder="Nhập mã giảm giá" class="form-input flex-1 text-sm">
                                <button onclick="applyPromoCodeToPayment()" class="px-5 py-2 bg-slate-800 text-white rounded-xl font-bold text-sm hover:bg-blue-600 transition-all whitespace-nowrap">
                                    Áp dụng
                                </button>
                            </div>
                            <div id="promo-message" class="text-xs mt-2 hidden"></div>
                        </div>
                        
                        <div id="discount-section" class="hidden border-t border-slate-200 pt-4 mb-4">
                            <div class="flex justify-between items-center text-green-600">
                                <span class="font-bold">Giảm giá</span>
                                <span class="text-xl font-bold" id="discount-amount">-0₫</span>
                            </div>
                        </div>
                        
                        <div class="border-t border-slate-200 pt-4">
                            <div class="flex justify-between items-center">
                                <span class="font-bold text-slate-800 text-lg">Tổng cộng</span>
                                <span class="text-2xl font-bold text-blue-600" id="final-total-amount">${formatCurrency(booking.totalPrice)}</span>
                            </div>
                        </div>
                    </div>

                    <h4 class="font-bold text-slate-900 mb-4 text-[15px]">Chọn phương thức thanh toán</h4>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <label class="flex flex-col items-center p-4 bg-white rounded-2xl border-2 border-slate-100 cursor-pointer hover:border-blue-400 hover:bg-blue-50/50 transition-all group">
                            <input type="radio" name="paymentMethod" value="cash" class="hidden peer" checked>
                            <div class="w-12 h-12 rounded-full bg-slate-50 flex items-center justify-center mb-3 group-hover:bg-white peer-checked:bg-blue-100 peer-checked:text-blue-600 transition-colors">
                                <i class="fa-solid fa-money-bill-wave text-xl text-slate-600 peer-checked:text-blue-600"></i>
                            </div>
                            <span class="text-sm font-bold text-slate-700">Tiền mặt</span>
                        </label>
                        <label class="flex flex-col items-center p-4 bg-white rounded-2xl border-2 border-slate-100 cursor-pointer hover:border-blue-400 hover:bg-blue-50/50 transition-all group">
                            <input type="radio" name="paymentMethod" value="bank" class="hidden peer">
                            <div class="w-12 h-12 rounded-full bg-slate-50 flex items-center justify-center mb-3 group-hover:bg-white peer-checked:bg-blue-100 peer-checked:text-blue-600 transition-colors">
                                <i class="fa-solid fa-building-columns text-xl text-slate-600 peer-checked:text-blue-600"></i>
                            </div>
                            <span class="text-sm font-bold text-slate-700">Chuyển khoản</span>
                        </label>
                        <label class="flex flex-col items-center p-4 bg-white rounded-2xl border-2 border-slate-100 cursor-pointer hover:border-blue-400 hover:bg-blue-50/50 transition-all group">
                            <input type="radio" name="paymentMethod" value="credit" class="hidden peer">
                            <div class="w-12 h-12 rounded-full bg-slate-50 flex items-center justify-center mb-3 group-hover:bg-white peer-checked:bg-blue-100 peer-checked:text-blue-600 transition-colors">
                                <i class="fa-regular fa-credit-card text-xl text-slate-600 peer-checked:text-blue-600"></i>
                            </div>
                            <span class="text-sm font-bold text-slate-700">Thẻ Visa/Master</span>
                        </label>
                        <label class="flex flex-col items-center p-4 bg-white rounded-2xl border-2 border-slate-100 cursor-pointer hover:border-blue-400 hover:bg-blue-50/50 transition-all group">
                            <input type="radio" name="paymentMethod" value="wallet" class="hidden peer">
                            <div class="w-12 h-12 rounded-full bg-slate-50 flex items-center justify-center mb-3 group-hover:bg-white peer-checked:bg-blue-100 peer-checked:text-blue-600 transition-colors">
                                <i class="fa-solid fa-qrcode text-xl text-slate-600 peer-checked:text-blue-600"></i>
                            </div>
                            <span class="text-sm font-bold text-slate-700">Ví điện tử</span>
                        </label>
                    </div>

                    <div id="payment-bank-details" class="mt-5 p-5 bg-blue-50/80 rounded-2xl border border-blue-100 hidden slide-in-up">
                        <div class="flex items-center mb-4 text-blue-800"><i class="fa-solid fa-circle-info mr-2"></i><h4 class="font-bold">Thông tin chuyển khoản</h4></div>
                        <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-100 space-y-3 text-[15px] text-slate-700">
                            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center border-b border-slate-50 pb-2"><span class="text-slate-500 text-sm mb-1 sm:mb-0">Ngân hàng</span><span class="font-bold text-slate-900">Vietcombank</span></div>
                            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center border-b border-slate-50 pb-2"><span class="text-slate-500 text-sm mb-1 sm:mb-0">Số tài khoản</span><span class="font-mono font-bold text-blue-600 text-lg">1234 5678 9012 3456</span></div>
                            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center border-b border-slate-50 pb-2"><span class="text-slate-500 text-sm mb-1 sm:mb-0">Chủ tài khoản</span><span class="font-bold text-slate-900">LUNA HOTEL & RESORT</span></div>
                            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center"><span class="text-slate-500 text-sm mb-1 sm:mb-0">Nội dung</span><span class="font-mono font-bold bg-slate-100 px-3 py-1 rounded" id="payment-bank-content">PAY ${bookingId.slice(-8).toUpperCase()}</span></div>
                        </div>
                        <button onclick="copyBankInfo()" class="mt-4 w-full bg-white border border-blue-200 text-blue-700 py-3 rounded-xl font-bold hover:bg-blue-600 hover:text-white transition-all shadow-sm">
                            <i class="fa-regular fa-copy mr-2"></i>Sao chép thông tin
                        </button>
                    </div>

                    <div id="payment-credit-form" class="mt-5 space-y-4 hidden slide-in-up">
                        <div class="bg-slate-900 p-6 rounded-2xl text-white shadow-lg relative overflow-hidden h-48 flex flex-col justify-between">
                            <div class="absolute inset-0 opacity-20 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-blue-400 via-transparent to-transparent"></div>
                            <div class="flex justify-between items-center relative z-10">
                                <i class="fa-solid fa-microchip text-4xl text-yellow-400 opacity-80"></i>
                                <div class="space-x-2 text-2xl">
                                    <i class="fa-brands fa-cc-visa"></i>
                                    <i class="fa-brands fa-cc-mastercard"></i>
                                </div>
                            </div>
                            <div class="relative z-10 text-center">
                                <p class="text-2xl font-mono tracking-[0.2em] shadow-sm" id="payment-card-number">**** **** **** ****</p>
                            </div>
                            <div class="flex justify-between relative z-10">
                                <div><p class="text-[10px] opacity-70 uppercase tracking-widest mb-0.5">Hạn thẻ</p><p class="font-mono text-sm" id="payment-card-expiry">**/**</p></div>
                                <div class="text-right"><p class="text-[10px] opacity-70 uppercase tracking-widest mb-0.5">CVC/CVV</p><p class="font-mono text-sm" id="payment-card-cvv">***</p></div>
                            </div>
                        </div>
                        
                        <div class="pt-2">
                            <label class="form-label">Số thẻ</label>
                            <input type="text" id="payment-card-number-input" maxlength="19" placeholder="0000 0000 0000 0000" class="form-input text-lg font-mono">
                        </div>
                        <div class="grid grid-cols-2 gap-5">
                            <div><label class="form-label">Hạn thẻ (MM/YY)</label><input type="text" id="payment-card-expiry-input" maxlength="5" placeholder="MM/YY" class="form-input text-center"></div>
                            <div><label class="form-label">CVV</label><input type="password" id="payment-card-cvv-input" maxlength="3" placeholder="***" class="form-input text-center"></div>
                        </div>
                        <div><label class="form-label">Tên chủ thẻ (Không dấu)</label><input type="text" id="payment-card-name" placeholder="NGUYEN VAN A" class="form-input uppercase"></div>
                    </div>

                    <div id="payment-wallet-details" class="mt-5 p-6 bg-slate-50 rounded-2xl border border-slate-100 hidden slide-in-up text-center">
                        <h4 class="font-bold text-slate-800 mb-2">Quét mã QR để thanh toán</h4>
                        <p class="text-sm text-slate-500 mb-6">Mở ứng dụng ngân hàng hoặc Momo, ZaloPay để quét mã</p>
                        <div class="inline-block p-4 bg-white rounded-2xl shadow-lg border border-slate-100">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=LUNA%20HOTEL%20${bookingId}" alt="QR Code" class="w-48 h-48">
                        </div>
                        <div class="flex justify-center gap-4 mt-6">
                            <img src="https://upload.wikimedia.org/wikipedia/vi/f/fe/MoMo_Logo.png" class="h-8 opacity-70 grayscale hover:grayscale-0 hover:opacity-100 transition-all cursor-pointer">
                            <img src="https://seeklogo.com/images/Z/zalopay-logo-6EA3E8E20B-seeklogo.com.png" class="h-8 opacity-70 grayscale hover:grayscale-0 hover:opacity-100 transition-all cursor-pointer">
                        </div>
                    </div>
                </div>
            `;

            document.querySelectorAll('input[name="paymentMethod"]').forEach(radio => {
                radio.addEventListener('change', function (e) {
                    document.querySelectorAll('input[name="paymentMethod"]').forEach(r => {
                        r.parentElement.classList.remove('border-blue-500', 'ring-2', 'ring-blue-100');
                        r.parentElement.classList.add('border-slate-100');
                    });
                    e.target.parentElement.classList.remove('border-slate-100');
                    e.target.parentElement.classList.add('border-blue-500', 'ring-2', 'ring-blue-100');

                    document.getElementById('payment-bank-details').classList.add('hidden');
                    document.getElementById('payment-credit-form').classList.add('hidden');
                    document.getElementById('payment-wallet-details').classList.add('hidden');

                    if (e.target.value === 'bank') document.getElementById('payment-bank-details').classList.remove('hidden');
                    else if (e.target.value === 'credit') document.getElementById('payment-credit-form').classList.remove('hidden');
                    else if (e.target.value === 'wallet') document.getElementById('payment-wallet-details').classList.remove('hidden');
                });
            });

            const firstLabel = document.querySelector('input[name="paymentMethod"]:checked').parentElement;
            firstLabel.classList.remove('border-slate-100');
            firstLabel.classList.add('border-blue-500', 'ring-2', 'ring-blue-100');

            setTimeout(() => {
                const cardNumberInput = document.getElementById('payment-card-number-input');
                const cardExpiryInput = document.getElementById('payment-card-expiry-input');
                const cardCvvInput = document.getElementById('payment-card-cvv-input');
                
                if (cardNumberInput) {
                    cardNumberInput.addEventListener('input', function (e) {
                        let value = e.target.value.replace(/\D/g, '');
                        let formatted = '';
                        for (let i = 0; i < value.length; i++) {
                            if (i > 0 && i % 4 === 0) formatted += ' ';
                            formatted += value[i];
                        }
                        e.target.value = formatted;
                        document.getElementById('payment-card-number').textContent = formatted || '**** **** **** ****';
                    });
                }
                
                if (cardExpiryInput) {
                    cardExpiryInput.addEventListener('input', function (e) {
                        let value = e.target.value.replace(/\D/g, '');
                        e.target.value = value.length >= 2 ? value.slice(0, 2) + '/' + value.slice(2, 4) : value;
                        document.getElementById('payment-card-expiry').textContent = e.target.value || '**/**';
                    });
                }
                
                if (cardCvvInput) {
                    cardCvvInput.addEventListener('input', function (e) {
                        document.getElementById('payment-card-cvv').textContent = e.target.value.padEnd(3, '*');
                    });
                }
            }, 100);

            modal.classList.remove('hidden');
        };

        window.processPayment = async function () {
            const btn = document.getElementById('btn-process-payment');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Đang xử lý...';
            btn.disabled = true;

            try {
                const bookingId = document.getElementById('payment-booking-id')?.value;
                if (!bookingId) throw new Error('Không tìm thấy mã đặt phòng');

                const method = document.querySelector('input[name="paymentMethod"]:checked')?.value;
                if (!method) throw new Error('Vui lòng chọn phương thức thanh toán');

                const bookingRef = doc(db, 'bookings', bookingId);
                const bookingDoc = await getDoc(bookingRef);
                if (!bookingDoc.exists()) throw new Error('Không tìm thấy thông tin đặt phòng');

                const booking = bookingDoc.data();
                const finalAmount = booking.totalPrice - currentDiscount;

                const paymentData = {
                    bookingId: bookingId,
                    amount: finalAmount,
                    originalAmount: booking.totalPrice,
                    discount: currentDiscount,
                    discountCode: currentDiscountCode || null,
                    method: method,
                    status: 'completed',
                    transactionId: 'TXN' + Date.now() + Math.random().toString(36).substr(2, 9).toUpperCase(),
                    createdAt: new Date().toISOString(),
                    completedAt: new Date().toISOString(),
                    userEmail: booking.userEmail,
                    roomCode: booking.roomCode,
                    bookingDetails: {
                        checkIn: booking.checkIn,
                        checkOut: booking.checkOut,
                        nights: booking.nights,
                        adultCount: booking.adultCount,
                        childCount: booking.childCount
                    }
                };

                if (currentUser) paymentData.userId = currentUser.uid;
                else paymentData.isGuest = true;

                const paymentRef = await addDoc(collection(db, 'payments'), paymentData);
                await updateDoc(bookingRef, {
                    paymentStatus: 'paid',
                    paymentId: paymentRef.id,
                    discountApplied: currentDiscount,
                    discountCode: currentDiscountCode || null,
                    finalPaidAmount: finalAmount,
                    updatedAt: new Date().toISOString()
                });

                showToast('Thanh toán hoàn tất!', 'success');
                window.closeModal('paymentModal');

                setTimeout(() => {
                    const searchBtn = document.getElementById('btn-submit-lookup');
                    if (searchBtn) searchBtn.click();
                }, 800);
            } catch (error) {
                console.error('Payment error:', error);
                showToast('Lỗi thanh toán: ' + error.message, 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            updateUserUI();
        }

        onAuthStateChanged(auth, async (user) => {
            setTimeout(() => {
                const loadingScreen = document.getElementById('loading-screen');
                if (loadingScreen) {
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                    }, 500);
                }
            }, 800);

            if (user) {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                currentUser = {
                    uid: user.uid,
                    email: user.email,
                    name: userDoc.data()?.name || user.displayName || user.email.split('@')[0]
                };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));

                const emailInput = document.getElementById('lookupEmail');
                if (emailInput) emailInput.value = currentUser.email;
            } else {
                currentUser = null;
                localStorage.removeItem('currentUser');
            }

            updateUserUI();

            const urlParams = new URLSearchParams(window.location.search);
            const bookingIdFromUrl = urlParams.get('booking');
            if (bookingIdFromUrl && !currentUser) {
                setTimeout(() => {
                    const emailInput = document.getElementById('lookupEmail');
                    const bookingInput = document.getElementById('lookupBookingId');
                    if (bookingInput && emailInput) {
                        bookingInput.value = bookingIdFromUrl;
                        document.getElementById('btn-submit-lookup')?.click();
                    }
                }, 1000);
            }
        });
    </script>
</body>

</html>
